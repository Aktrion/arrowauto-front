<div class="space-y-6">
  <div
    class="flex flex-wrap items-center gap-2 p-1.5 bg-base-200/50 rounded-xl border border-base-200/80 w-fit"
  >
    <button
      class="btn btn-sm gap-2 font-bold transition-all"
      [class.btn-primary]="filterStatus() === 'all'"
      [class.btn-ghost]="filterStatus() !== 'all'"
      (click)="setStatusFilter('all')"
    >
      {{ 'TASKS.ALL' | translate }}
      <span class="badge badge-sm" [class.badge-primary-content]="filterStatus() === 'all'">
        {{ taskCounts().all }}
      </span>
    </button>
    <button
      class="btn btn-sm gap-2 font-bold transition-all"
      [class.btn-warning]="filterStatus() === 'pending'"
      [class.btn-ghost]="filterStatus() !== 'pending'"
      (click)="setStatusFilter('pending')"
    >
      {{ 'TASKS.PENDING' | translate }}
        <span class="badge badge-sm">{{ taskCounts().pending }}</span>
    </button>
    <button
      class="btn btn-sm gap-2 font-bold transition-all"
      [class.btn-info]="filterStatus() === 'scheduled'"
      [class.btn-ghost]="filterStatus() !== 'scheduled'"
      (click)="setStatusFilter('scheduled')"
    >
      {{ 'TASKS.SCHEDULED' | translate }}
        <span class="badge badge-sm">{{ taskCounts().scheduled }}</span>
    </button>
    <button
      class="btn btn-sm gap-2 font-bold transition-all"
      [class.btn-primary]="filterStatus() === 'in_progress'"
      [class.btn-ghost]="filterStatus() !== 'in_progress'"
      (click)="setStatusFilter('in_progress')"
    >
      {{ 'TASKS.IN_PROGRESS' | translate }}
        <span class="badge badge-sm">{{ taskCounts().in_progress }}</span>
    </button>
    <button
      class="btn btn-sm gap-2 font-bold transition-all"
      [class.btn-success]="filterStatus() === 'completed'"
      [class.btn-ghost]="filterStatus() !== 'completed'"
      (click)="setStatusFilter('completed')"
    >
      {{ 'TASKS.COMPLETED' | translate }}
        <span class="badge badge-sm">{{ taskCounts().completed }}</span>
    </button>
  </div>

  <app-data-grid [config]="gridConfig" (stateChange)="handleGridStateChange($event)" />
</div>

<dialog id="task_photos_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box bg-base-100 shadow-2xl border border-base-300 max-w-3xl">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <h3 class="font-bold text-lg mb-4">Inspection Photos</h3>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
      @for (url of viewingImages(); track url) {
        <a [href]="url" target="_blank" rel="noopener">
          <img [src]="url" class="w-full h-40 object-cover rounded-lg border border-base-200 hover:opacity-80 transition-opacity cursor-pointer" alt="Inspection photo" />
        </a>
      }
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop bg-neutral/50 backdrop-blur-sm">
    <button>close</button>
  </form>
</dialog>
